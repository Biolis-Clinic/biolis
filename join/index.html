<!-- ▼ 폼 주소가 바뀌면 FORM_BASE / FORM_SHORT 교체. 소개자 추가는 REFS에 한 줄 추가 -->
<script>
  const FORM_SHORT = "https://forms.gle/pVVibCoWdVyTpdyHA";
  const FORM_BASE  = "https://docs.google.com/forms/d/e/1FAIpQLScMSdNLTvBelCf-wTPC71x_DRaBcNpesVMc55bL2EAkzSAtsw/viewform";
  const ENTRY_REF  = "entry.336513047";
  const REFS = {
    "patrick":   "パトリック・ノ",
    "hirota":    "廣田 和久",
    "matsumoto": "松本 拓也"
  };
  const code = new URLSearchParams(location.search).get("r");
  const REDIRECT_URL = (code && REFS[code])
    ? FORM_BASE + "?usp=pp_url&" + ENTRY_REF + "=" + encodeURIComponent(REFS[code])
    : FORM_SHORT;
  setTimeout(function(){ window.location.replace(REDIRECT_URL); }, 2500);
  document.addEventListener("DOMContentLoaded", function(){
    document.querySelectorAll("a[data-form]").forEach(a => a.href = REDIRECT_URL);
  });
</script>
