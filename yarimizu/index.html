<style>
:root{--cream:#F4EEE4;--cream2:#EDE4D5;--white:#FCFBF8;--ink:#2E2820;--body:#5A5246;--mut:#9A8E7C;--gold:#C1A25E;--gold-dk:#9C7E3C;--line:#EBE3D5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:"Noto Sans JP","Noto Sans KR",sans-serif;background:radial-gradient(120% 90% at 50% 0%,#FBF7F0 0%,var(--cream) 55%,var(--cream2) 100%);color:var(--ink);display:flex;justify-content:center;align-items:flex-start;padding:26px 16px 40px;min-height:100vh;}
.lang{position:fixed;top:14px;right:14px;display:flex;gap:2px;background:rgba(255,255,255,.72);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:999px;padding:3px;z-index:10;}
.lang button{font:600 10.5px/1 "Noto Sans JP","Noto Sans KR",sans-serif;letter-spacing:.3px;color:var(--mut);background:none;border:none;padding:7px 11px;border-radius:999px;cursor:pointer;transition:.18s;white-space:nowrap;}
.lang button:hover{color:var(--gold-dk);}
.lang button.on{background:linear-gradient(100deg,#B79350,#D8BE86 45%,#C4A461 55%,#A9863E);color:#fff;box-shadow:0 3px 10px -4px rgba(160,120,50,.65);}
.card{width:100%;max-width:400px;background:var(--white);border-radius:22px;box-shadow:0 18px 50px -18px rgba(70,54,34,.35),0 2px 6px rgba(70,54,34,.06);border:1px solid #F1EADD;overflow:hidden;}
.top{padding:30px 30px 22px;text-align:center;}
.blogo{width:150px;margin:0 auto 20px;display:block;}
.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;object-position:center 28%;margin:0 auto 16px;display:block;box-shadow:0 0 0 3px #fff,0 0 0 4.5px var(--gold),0 10px 22px -8px rgba(70,54,34,.4);background:#EEE7DA;}
.name{font-family:"Noto Serif JP",serif;font-weight:600;font-size:26px;letter-spacing:1px;color:var(--ink);line-height:1.35;}
.name-en{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold-dk);margin-top:7px;}
.field{display:inline-block;margin-top:11px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#fff;background:linear-gradient(100deg,#C6A968,#A9863E);padding:5px 14px;border-radius:999px;}
.spec{font-size:12.5px;color:var(--body);margin-top:12px;line-height:1.5;}
.cred{font-size:11px;color:var(--mut);margin-top:6px;letter-spacing:.3px;}
.flipsec{padding:6px 22px 6px;}
.flip{perspective:1100px;width:100%;margin:0 auto;}
.flip-inner{position:relative;width:100%;padding-top:60.4%;transition:transform .8s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d;cursor:pointer;}
.flip.flipped .flip-inner{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:11px;overflow:hidden;box-shadow:0 12px 26px -12px rgba(70,54,34,.45),0 0 0 1px #EFE7D9;}
.flip-face img{width:100%;height:100%;object-fit:cover;display:block;}
.flip-back{transform:rotateY(180deg);}
.flip-hint{text-align:center;font-size:10.5px;letter-spacing:1px;color:var(--mut);margin-top:9px;}
.flip-hint svg{width:12px;height:12px;vertical-align:-2px;stroke:var(--gold-dk);fill:none;stroke-width:1.7;margin-right:4px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55;margin:2px 30px 0;}
.actions{padding:20px 22px 8px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.act{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px 8px;border:1px solid var(--line);border-radius:14px;background:#FEFDFB;color:var(--ink);text-decoration:none;transition:.18s;cursor:pointer;}
.act:active{transform:scale(.97);}.act:hover{border-color:var(--gold);background:#FBF6EC;}
.act svg{width:22px;height:22px;stroke:var(--gold-dk);fill:none;stroke-width:1.6;}
.act span{font-size:12px;font-weight:500;}
.act-event{grid-column:1 / -1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:14px;text-decoration:none;cursor:pointer;background:linear-gradient(100deg,#B79350,#D8BE86 45%,#C4A461 55%,#A9863E);color:#fff;box-shadow:0 8px 22px -8px rgba(160,120,50,.6);transition:.18s;margin-bottom:4px;}
.act-event::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-20deg);animation:sweepBtn 3.6s ease-in-out infinite;}
.act-event:active{transform:scale(.99);}
.act-event svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8;}
.act-event span[data-i="event"]{font:700 14px/1 "Noto Sans JP",sans-serif;letter-spacing:1px;}
.act-event .ev-badge{position:relative;z-index:1;font-size:10.5px;font-weight:700;letter-spacing:.5px;background:rgba(255,255,255,.28);color:#fff;padding:3px 9px;border-radius:999px;margin-left:2px;}
.save{margin:12px 22px 4px;}
.save button{position:relative;overflow:hidden;width:100%;border:none;cursor:pointer;padding:16px;border-radius:14px;background:linear-gradient(100deg,#2C6B57,#3E8C71 45%,#347A61 55%,#265E4C);color:#fff;font:700 14px/1 "Noto Sans JP",sans-serif;letter-spacing:1px;box-shadow:0 8px 22px -8px rgba(38,94,76,.62);display:flex;align-items:center;justify-content:center;gap:9px;}
.save button::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.42),transparent);transform:skewX(-20deg);animation:sweepBtn 3.6s ease-in-out infinite;}
@keyframes sweepBtn{0%,55%{left:-60%;}85%{left:120%;}100%{left:120%;}}
.save button:active{transform:scale(.99);}.save button svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:1.8;}
.qr{padding:14px 22px 6px;text-align:center;}
.qr-inner{display:inline-flex;flex-direction:column;align-items:center;gap:9px;padding:16px 16px 12px;border:1px solid var(--line);border-radius:16px;background:#FEFDFB;}
.qrimg{width:158px;height:158px;display:block;border-radius:8px;cursor:pointer;}
.qr-hint{font-size:10px;color:var(--mut);letter-spacing:.5px;margin-top:-3px;}
.qrmodal{position:fixed;inset:0;background:rgba(30,26,22,.72);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;}
.qrmodal.on{display:flex;}
.qrmodal-box{background:#fff;border-radius:22px;padding:26px 26px 20px;text-align:center;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);max-width:340px;width:100%;}
.qrmodal-box img{width:100%;max-width:280px;height:auto;display:block;margin:0 auto 14px;border-radius:10px;}
.qrmodal-cap{font-size:12px;color:var(--body);margin-bottom:16px;line-height:1.5;}
.qrmodal-btns{display:flex;gap:10px;}
.qrmodal-btns button{flex:1;border:none;cursor:pointer;padding:13px;border-radius:11px;font:700 12.5px/1 "Noto Sans JP",sans-serif;letter-spacing:.5px;}
.qrmodal-save{background:linear-gradient(100deg,#B79350,#D8BE86 45%,#C4A461 55%,#A9863E);color:#fff;}
.qrmodal-close{background:#F2ECE0;color:var(--body);}
.qr-cap{font-size:11px;color:var(--mut);letter-spacing:.5px;}
.qr-dl{font:600 11px/1 "Noto Sans JP",sans-serif;color:var(--gold-dk);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:2px;}
.foot{padding:14px 24px 30px;text-align:center;}
.foot .clinic{font-size:11px;color:var(--gold-dk);font-weight:700;letter-spacing:2px;margin-bottom:8px;}
.foot .info{font-size:10px;color:var(--mut);line-height:1.7;}
</style></head><body>
