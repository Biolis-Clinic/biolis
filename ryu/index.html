<style>
  :root{
    --cream:#F4EEE4; --cream2:#EDE4D5; --white:#FCFBF8;
    --ink:#2E2820; --body:#5A5246; --mut:#9A8E7C;
    --gold:#C1A25E; --gold-dk:#9C7E3C; --line:#EBE3D5;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  body{
    font-family:"Noto Sans JP","Noto Sans KR",sans-serif;
    background:radial-gradient(120% 90% at 50% 0%, #FBF7F0 0%, var(--cream) 55%, var(--cream2) 100%);
    color:var(--ink); display:flex; justify-content:center; align-items:flex-start;
    padding:26px 16px 40px; min-height:100vh;
  }
  .lang{position:fixed; top:14px; right:14px; display:flex; gap:2px; background:rgba(255,255,255,.7);
    backdrop-filter:blur(6px); border:1px solid var(--line); border-radius:999px; padding:3px; z-index:10;}
  .lang button{font:600 10.5px/1 "Noto Sans JP","Noto Sans KR",sans-serif; letter-spacing:.3px; color:var(--mut);
    background:none; border:none; padding:7px 11px; border-radius:999px; cursor:pointer; transition:.18s; white-space:nowrap;}
  .lang button:hover{color:var(--gold-dk);}
  .lang button.on{background:linear-gradient(100deg,#B79350,#D8BE86 45%,#C4A461 55%,#A9863E); color:#fff;
    box-shadow:0 3px 10px -4px rgba(160,120,50,.65);}

  .card{width:100%; max-width:400px; background:var(--white); border-radius:22px;
    box-shadow:0 18px 50px -18px rgba(70,54,34,.35), 0 2px 6px rgba(70,54,34,.06);
    border:1px solid #F1EADD; overflow:hidden;}
  .top{padding:38px 30px 26px; text-align:center; position:relative;}
  .logo{width:74%; max-width:250px; margin:0 auto 22px; display:block; position:relative;}
  .logo-wrap{position:relative; overflow:hidden; display:inline-block; width:100%;}
  .logo-wrap::after{content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.65),transparent);
    transform:skewX(-18deg); animation:sweep 5.5s ease-in-out infinite;}
  @keyframes sweep{0%,60%{left:-60%;} 82%{left:120%;} 100%{left:120%;}}

  .name{font-family:"Noto Serif JP","Noto Serif KR","Cormorant Garamond",serif; font-weight:600; font-size:30px;
    letter-spacing:2px; line-height:1.45; padding-bottom:6px;
    background:linear-gradient(100deg,#9A7C38,#C9A85E 38%,#F1E4BC 50%,#C9A85E 62%,#9A7C38);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    background-size:220% auto; animation:shine 5s linear infinite;}
  @keyframes shine{to{background-position:220% center;}}
  .name-en{font-size:11px; font-weight:700; letter-spacing:5px; color:var(--gold-dk); margin-top:9px;}
  .title{font-size:11.5px; font-weight:500; color:var(--body); margin-top:12px; line-height:1.5;}
  .tagline{font-family:"Noto Serif JP",serif; font-size:12px; color:var(--mut); letter-spacing:1.5px; margin-top:14px;}

  .flip{perspective:1100px; width:84%; max-width:290px; margin:22px auto 2px;}
  .flip-inner{position:relative; width:100%; padding-top:60.4%; transition:transform .85s cubic-bezier(.4,.15,.2,1); transform-style:preserve-3d; cursor:pointer;}
  .flip.flipped .flip-inner{transform:rotateY(180deg);}
  .flip-face{position:absolute; inset:0; -webkit-backface-visibility:hidden; backface-visibility:hidden; border-radius:11px; overflow:hidden; box-shadow:0 12px 28px -12px rgba(70,54,34,.45), 0 0 0 1px #EFE7D9;}
  .flip-face img{width:100%; height:100%; object-fit:cover; display:block;}
  .flip-back{transform:rotateY(180deg);}
  .flip-hint{text-align:center; font-size:10.5px; letter-spacing:1px; color:var(--mut); margin-top:10px;}
  .flip-hint svg{width:12px; height:12px; vertical-align:-2px; stroke:var(--gold-dk); fill:none; stroke-width:1.7; margin-right:4px;}
  .divider{height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.55; margin:4px 30px 0;}

  .actions{padding:22px 22px 8px; display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .act{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
    padding:15px 8px; border:1px solid var(--line); border-radius:14px; background:#FEFDFB;
    color:var(--ink); text-decoration:none; transition:.18s; cursor:pointer;}
  .act:active{transform:scale(.97);}
  .act:hover{border-color:var(--gold); background:#FBF6EC;}
  .act svg{width:22px; height:22px; stroke:var(--gold-dk); fill:none; stroke-width:1.6;}
  .act span{font-size:12px; font-weight:500; letter-spacing:.3px;}

  /* Special-event promo button — matches Save-Contact design (gold shimmer) */
  .act-event{grid-column:1 / -1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; gap:10px;
    padding:16px; border-radius:14px; text-decoration:none; cursor:pointer;
    background:linear-gradient(100deg,#B79350,#D8BE86 45%,#C4A461 55%,#A9863E);
    color:#fff; box-shadow:0 8px 22px -8px rgba(160,120,50,.6); transition:.18s;}
  .act-event::after{content:""; position:absolute; top:0; left:-60%; width:45%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-20deg); animation:sweepBtn 3.6s ease-in-out infinite;}
  .act-event:active{transform:scale(.99);}
  .act-event svg{width:20px; height:20px; stroke:#fff; fill:none; stroke-width:1.8;}
  .act-event span[data-i="event"]{font:700 14px/1 "Noto Sans JP",sans-serif; letter-spacing:1px;}
  .act-event .ev-badge{position:relative; z-index:1; font-size:10.5px; font-weight:700; letter-spacing:.5px;
    background:rgba(255,255,255,.28); color:#fff; padding:3px 9px; border-radius:999px; margin-left:2px;}
  .actions .act-event{margin-bottom:4px;}

  .save{margin:12px 22px 4px;}
  .save button{position:relative; overflow:hidden; width:100%; border:none; cursor:pointer; padding:16px; border-radius:14px;
    background:linear-gradient(100deg,#2C6B57,#3E8C71 45%,#347A61 55%,#265E4C);
    color:#fff; font:700 14px/1 "Noto Sans JP",sans-serif; letter-spacing:1px;
    box-shadow:0 8px 22px -8px rgba(38,94,76,.62); display:flex; align-items:center; justify-content:center; gap:9px;}
  .save button::after{content:""; position:absolute; top:0; left:-60%; width:45%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.42),transparent);
    transform:skewX(-20deg); animation:sweepBtn 3.6s ease-in-out infinite;}
  @keyframes sweepBtn{0%,55%{left:-60%;} 85%{left:120%;} 100%{left:120%;}}
  .save button:active{transform:scale(.99);} .save button svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:1.8;}

  .qr{padding:14px 22px 6px; text-align:center;}
  .qr-inner{display:inline-flex; flex-direction:column; align-items:center; gap:9px;
    padding:16px 16px 12px; border:1px solid var(--line); border-radius:16px; background:#FEFDFB;}
  .qrimg{width:158px; height:158px; display:block; border-radius:8px; cursor:pointer;}
  .qr-hint{font-size:10px; color:var(--mut); letter-spacing:.5px; margin-top:-3px;}
  .qrmodal{position:fixed; inset:0; background:rgba(30,26,22,.72); backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center; z-index:100; padding:24px;}
  .qrmodal.on{display:flex;}
  .qrmodal-box{background:#fff; border-radius:22px; padding:26px 26px 20px; text-align:center;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.5); max-width:340px; width:100%;}
  .qrmodal-box img{width:100%; max-width:280px; height:auto; display:block; margin:0 auto 14px; border-radius:10px;}
  .qrmodal-cap{font-size:12px; color:var(--body); margin-bottom:16px; line-height:1.5;}
  .qrmodal-btns{display:flex; gap:10px;}
  .qrmodal-btns button{flex:1; border:none; cursor:pointer; padding:13px; border-radius:11px;
    font:700 12.5px/1 "Noto Sans JP",sans-serif; letter-spacing:.5px;}
  .qrmodal-save{background:linear-gradient(100deg,#B79350,#D8BE86 45%,#C4A461 55%,#A9863E); color:#fff;}
  .qrmodal-close{background:#F2ECE0; color:var(--body);}
  .qr-cap{font-size:11px; color:var(--mut); letter-spacing:.5px;}
  .qr-dl{font:600 11px/1 "Noto Sans JP",sans-serif; color:var(--gold-dk); background:none;
    border:none; cursor:pointer; text-decoration:underline; text-underline-offset:3px; padding:2px;}
  .docslink{padding:6px 22px 0;}
  .docslink a{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:1px solid var(--line);border-radius:14px;background:#FEFDFB;text-decoration:none;color:var(--gold-dk);font-size:12.5px;font-weight:700;letter-spacing:1px;transition:.18s;}
  .docslink a:hover{border-color:var(--gold);background:#FBF6EC;}
  .docslink a:active{transform:scale(.99);}
  .docslink svg{width:17px;height:17px;stroke:var(--gold-dk);fill:none;stroke-width:1.7;flex-shrink:0;}
  .foot{padding:14px 24px 30px; text-align:center;}
  .foot .clinic{font-size:11px; color:var(--gold-dk); font-weight:700; letter-spacing:2px; margin-bottom:8px;}
  .clinic-photo{margin:2px 0 14px; border-radius:14px; overflow:hidden; box-shadow:0 6px 18px rgba(60,50,35,.14); border:1px solid var(--line);}
  .clinic-photo img{display:block; width:100%; height:auto;}
  .foot .info{font-size:10px; color:var(--mut); line-height:1.75;}
  .hide{display:none !important;}
</style>
</head>

  <button data-l="ko" onclick="setLang('ko')">한국어</button>

</div>

function saveVCard(){
  var vcard=buildVCard();
  var fname="Terufumi Ryu.vcf";
  // iOS (incl. in-app browsers like LINE/Instagram): Blob download is blocked.
  // Navigate to a data: URI so Safari opens the contact card ("Add Contact").
  var ua=navigator.userAgent||"";
  var isIOS=/iP(hone|od|ad)/.test(ua) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
  if(isIOS){
    var dataURI="data:text/vcard;charset=utf-8,"+encodeURIComponent(vcard);
    window.location.href=dataURI;
    return;
  }
  // Android & desktop: try Blob download; fall back to data: URI on failure.
  try{
    var blob=new Blob([vcard],{type:"text/vcard;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    setTimeout(function(){a.remove(); URL.revokeObjectURL(url);},1500);
  }catch(e){
    window.location.href="data:text/vcard;charset=utf-8,"+encodeURIComponent(vcard);
  }
}
