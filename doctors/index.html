<style>
:root{--cream:#F4EEE4;--cream2:#EDE4D5;--white:#FCFBF8;--ink:#2E2820;--body:#5A5246;--mut:#9A8E7C;--gold:#C1A25E;--gold-dk:#9C7E3C;--line:#EBE3D5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:"Noto Sans JP","Noto Sans KR",sans-serif;background:radial-gradient(120% 70% at 50% 0%,#FBF7F0 0%,var(--cream) 55%,var(--cream2) 100%);color:var(--ink);display:flex;justify-content:center;padding:26px 14px 44px;min-height:100vh;}
.lang{position:fixed;top:14px;right:14px;display:flex;gap:2px;background:rgba(255,255,255,.72);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:999px;padding:3px;z-index:10;}
.lang button{font:600 11px/1 "Noto Sans JP",sans-serif;letter-spacing:.5px;color:var(--mut);background:none;border:none;padding:6px 10px;border-radius:999px;cursor:pointer;}
.lang button.on{background:var(--ink);color:#fff;}
.wrap{width:100%;max-width:430px;}
.head{text-align:center;padding:14px 10px 20px;}
.head img{width:62%;max-width:220px;margin:0 auto 12px;display:block;}
.head .sub{font-family:"Noto Serif JP",serif;font-size:13px;letter-spacing:3px;color:var(--gold-dk);}
.head .rule{width:44px;height:1px;background:var(--gold);opacity:.6;margin:12px auto 0;}
.doc{display:flex;gap:14px;background:var(--white);border:1px solid #F0E9DC;border-radius:18px;padding:13px;margin-top:13px;box-shadow:0 10px 26px -16px rgba(70,54,34,.35);}
.doc-photo{width:116px;height:148px;object-fit:cover;object-position:top center;border-radius:12px;flex-shrink:0;background:#EEE7DA;}
.doc-info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.doc-field{display:inline-block;align-self:flex-start;font-size:10.5px;font-weight:700;letter-spacing:1px;color:#fff;background:linear-gradient(100deg,#C6A968,#A9863E);padding:4px 10px;border-radius:999px;margin-bottom:8px;}
.doc-name{font-family:"Noto Serif JP",serif;font-size:19px;font-weight:600;letter-spacing:1px;line-height:1.1;}
.doc-name-en{font-size:9.5px;font-weight:700;letter-spacing:2.5px;color:var(--gold-dk);margin-top:4px;}
.doc-spec{font-size:12.5px;color:var(--body);margin-top:7px;line-height:1.45;}
.doc-cred{font-size:10.5px;color:var(--mut);margin-top:6px;letter-spacing:.3px;}
.cta{margin:22px 4px 0;text-align:center;}

const UI={"subtitle": {"ja": "医師紹介", "ko": "의료진 소개", "en": "Our Doctors"}, "cta": {"ja": "ご予約・お問い合わせは DM / LINE まで", "ko": "예약·문의는 DM / LINE 으로", "en": "Booking & inquiries via DM / LINE"}, "foot": {"ja": "東京都中央区八重洲1-3-18 VORT東京八重洲maxim 5F ／ TEL 03-6262-2677", "ko": "도쿄도 주오구 야에스 1-3-18 VORT東京八重洲maxim 5F ／ TEL 03-6262-2677", "en": "VORT Tokyo Yaesu maxim 5F, 1-3-18 Yaesu, Chuo-ku, Tokyo ／ TEL 03-6262-2677"}};
function render(l){
  document.getElementById('list').innerHTML=DOCS.map(d=>`
    <div class="doc">
      <img class="doc-photo" src="data:image/jpeg;base64,${d.photo}" alt="${d.name}">
      <div class="doc-info">
        <span class="doc-field">${d.field[l]}</span>
        <div class="doc-name">${d.name_jp}</div>
        <div class="doc-name-en">${d.name.toUpperCase()}</div>
        <div class="doc-spec">${d.spec[l]}</div>
        <div class="doc-cred">${d.cred[l]}</div>
      </div>
    </div>`).join('');
  document.getElementById('sub').textContent=UI.subtitle[l];
  document.getElementById('cta').textContent=UI.cta[l];
  document.getElementById('foot').textContent=UI.foot[l];
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  document.documentElement.lang=l;
}
function setLang(l){render(l);}
render('ja');
