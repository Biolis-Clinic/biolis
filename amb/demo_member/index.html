<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>田中 花子 · BiOLiS AMBASSADOR</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="https://biolis-clinic.github.io/biolis/assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+JP:wght@500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#2E2820;--mut:#9A8E7C;--line:#EBE3D5;--accent:#A56B3C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans JP",sans-serif;background:radial-gradient(120% 90% at 50% 0%, #FBF7F0 0%, #F4EEE4 55%, #EDE4D5 100%);color:var(--ink);
  display:flex;justify-content:center;align-items:flex-start;padding:30px 16px 44px;min-height:100vh;}
.card{width:100%;max-width:400px;background:#FCFBF8;border-radius:22px;overflow:hidden;
  box-shadow:0 20px 55px -18px rgba(70,54,34,.35);border:1px solid #EFE7D9;}
.top{padding:40px 30px 30px;text-align:center;position:relative;}
.top::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(100deg,#96562F,#C58B5A 45%,#B0744A 55%,#84491F);}
.badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(100deg,#96562F,#C58B5A 45%,#B0744A 55%,#84491F);color:#fff;
  font:700 10.5px/1 "Noto Sans JP",sans-serif;letter-spacing:.32em;padding:7px 16px 7px 18px;border-radius:100px;}
.badge svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:1.8;}
.emblem{width:64px;height:64px;margin:22px auto 6px;}
.emblem svg{width:100%;height:100%;}
.brand{font-family:"Cormorant Garamond",serif;font-size:20px;letter-spacing:.5px;color:var(--ink);}
.brand span{color:var(--accent);letter-spacing:3px;font-size:14px;}
.role{font-size:9.5px;letter-spacing:.34em;color:var(--mut);margin-top:6px;text-transform:uppercase;}
.name{font-family:"Noto Serif JP",serif;font-weight:600;font-size:27px;letter-spacing:3px;margin-top:18px;}
.tier-note{font-size:10.5px;color:var(--mut);margin-top:8px;letter-spacing:.14em;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.55;margin:26px 30px 0;}
.actions{padding:24px 22px 10px;display:grid;gap:10px;}
.btn-main{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:9px;
  padding:16px;border-radius:14px;text-decoration:none;background:linear-gradient(100deg,#96562F,#C58B5A 45%,#B0744A 55%,#84491F);color:#fff;
  font:700 14px/1 "Noto Sans JP",sans-serif;letter-spacing:1px;box-shadow:0 8px 22px -8px rgba(70,54,34,.35);}
.btn-main::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);
  transform:skewX(-20deg);animation:sweep 3.8s ease-in-out infinite;}
@keyframes sweep{0%,55%{left:-60%;}85%{left:120%;}100%{left:120%;}}
.btn-main svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:1.8;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 10px;border-radius:14px;
  border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;text-decoration:none;
  font:600 12.5px/1 "Noto Sans JP",sans-serif;letter-spacing:.4px;transition:.18s;font-family:inherit;}
.btn:hover{border-color:var(--accent);}
.btn svg{width:17px;height:17px;stroke:var(--accent);fill:none;stroke-width:1.8;flex-shrink:0;}
.btn.copied{background:linear-gradient(100deg,#96562F,#C58B5A 45%,#B0744A 55%,#84491F);border-color:transparent;color:#fff;}
.btn.copied svg{stroke:#fff;}
.amblink{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:14px;
  border:1px solid var(--line);color:var(--accent);text-decoration:none;
  font:600 12.5px/1 "Noto Sans JP",sans-serif;letter-spacing:.4px;}
.amblink svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:1.8;}
.foot{text-align:center;font-size:9.5px;color:var(--mut);letter-spacing:.22em;padding:18px 20px 26px;}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="badge"><svg viewBox="0 0 24 24"><path d="M12 2l2.9 6.26L21 9.27l-5 4.87L17.18 21 12 17.77 6.82 21 8 14.14l-5-4.87 6.1-1.01L12 2z"/></svg>MEMBER AMBASSADOR</div>
    <div class="emblem">
      <svg viewBox="0 0 100 100" fill="none" stroke="#A56B3C" stroke-width="1.6">
        <circle cx="50" cy="29.5" r="20.5"/><circle cx="29.5" cy="50" r="20.5"/>
        <circle cx="70.5" cy="50" r="20.5"/><circle cx="50" cy="70.5" r="20.5"/>
        <line x1="9" y1="50" x2="91" y2="50" stroke-width="5.5"/>
      </svg>
    </div>
    <div class="brand">BiOLiS <span>CLINIC</span></div>
    <div class="role">Official Ambassador Program</div>
    <div class="name">田中 花子</div>
    <div class="tier-note">東京・八重洲｜再生医療 × 美容医療</div>
  </div>
  <div class="divider"></div>
  <div class="actions">
    <a class="btn-main" href="https://biolis-clinic.github.io/biolis/form/?r=tanaka" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      BiOLiSを紹介する</a>
    <div class="row">
      <a class="btn" href="https://line.me/R/share?text=BiOLiS%20CLINIC%20%E3%81%94%E7%B4%B9%E4%BB%8B%0Ahttps%3A//biolis-clinic.github.io/biolis/form/%3Fr%3Dtanaka" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.5-.76L3 21l1.76-6A8.5 8.5 0 1 1 21 11.5z"/></svg>
        LINEで送る</a>
      <button class="btn" onclick="copyLink(this)" data-url="https://biolis-clinic.github.io/biolis/form/?r=tanaka">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        リンクをコピー</button>
    </div>
    <a class="amblink" href="https://biolis-clinic.github.io/biolis/ambassador/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>
      アンバサダープログラムについて</a>
  </div>
  <div class="foot">BiOLiS CLINIC ｜ TOKYO YAESU</div>
</div>
<script>
function copyLink(btn){
  var url=btn.getAttribute("data-url");
  (navigator.clipboard?navigator.clipboard.writeText(url):Promise.reject()).then(function(){
    btn.classList.add("copied");var sp=btn.querySelector("svg").nextSibling;
    var t=btn.innerHTML;btn.dataset.orig=t;btn.innerHTML="✓ コピーしました";
    setTimeout(function(){btn.classList.remove("copied");btn.innerHTML=btn.dataset.orig;},1400);
  }).catch(function(){prompt("リンクをコピーしてください", url);});
}
</script>
</body>
</html>
